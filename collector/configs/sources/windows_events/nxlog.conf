# nxlog Windows Event Log 转发配置
# 将 Windows Security Event 转发为 Syslog 到 Vector

<Input security_events>
    Module      im_msvistalog
    Query       <QueryList>
                   <Query Id="0">
                     <Select Path="Security">*</Select>
                   </Query>
                   <Query Id="1">
                     <Select Path="System">*</Select>
                   </Query>
                 </QueryList>
    PollInterval 1
</Input>

<Input application_events>
    Module      im_msvistalog
    Query       <QueryList>
                   <Query Id="0">
                     <Select Path="Application">*</Select>
                   </Query>
                 </QueryList>
    PollInterval 5
</Input>

<Output to_syslog_tcp>
    Module      om_tcp
    Host        ${VECTOR_HOST:10.0.0.100}
    Port        514
    Exec        to_syslog_snare();
    Exec        $raw_event = "[" + now_str() + "] " + $raw_event;
</Output>

<Output to_syslog_udp>
    Module      om_udp
    Host        ${VECTOR_HOST:10.0.0.100}
    Port        5140
    Exec        to_syslog_snare();
</Output>

<Route security_to_tcp>
    Path        security_events => to_syslog_tcp
</Route>

<Route application_to_udp>
    Path        application_events => to_syslog_udp
</Route>
