# snmptrapd SNMP Trap 中转配置
# 将 SNMP Trap 转换为 Syslog 并转发到 Vector

# 禁用SNMPv1重试(可能导致重复告警)
doNotRetain SNMPv1

# 接受所有 Trap(生产环境应限制)
authCommunity log,execute,net public

# 转发所有 Trap 到 Vector(TCP确保可靠)
forward default public@${VECTOR_HOST:-10.0.0.100}:514

# 启动文本模式处理(便于调试和通用解析)
traphandle default /usr/bin/snmptthandler

# 自定义处理脚本(可选，用于格式转换)
# traphandle SNMPv2-MIB::coldStart /usr/local/bin/handle_trap.sh
