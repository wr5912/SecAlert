# Prometheus 配置 for SecAlert

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'secalert-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/metrics/collection/prometheus'

  - job_name: 'secalert-vector'
    static_configs:
      - targets: ['vector:9001']

  - job_name: 'secalert-kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
