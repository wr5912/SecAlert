# ============================================
# SecAlert 开发环境配置
# 仅启动基础设施服务，API 和前端由用户手动启动
#
# 启动方式:
#   1. 启动基础设施 (Docker):
#      sudo docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
#   2. 启动后端 (本地，端口 58000):
#      cd /home/admin/work/SecAlert && source .venv/bin/activate && uvicorn src.api.main:app --host 0.0.0.0 --port 58000 --reload
#
#   3. 启动前端 (本地，端口 3000):
#      cd /home/admin/work/SecAlert/frontend && npm run dev
#
#   端口映射:
#      52181 -> Zookeeper
#      59092 -> Kafka
#      59200 -> Elasticsearch
#      56379 -> Redis
#      55432 -> PostgreSQL
#      57474/57687 -> Neo4j
#      55044 -> Logstash
#      59000/59003 -> MinIO
#      59090 -> Prometheus
#      58000 -> API (后端)
#      3000  -> 前端
# ============================================

services:
  # ============================================
  # Zookeeper
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: secalert-zookeeper-dev
    ports:
      - "52181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ============================================
  # Kafka
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: secalert-kafka-dev
    ports:
      - "59092:9092"  # 宿主机访问端口
      - "29092:29092" # 容器间通信端口
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092 # 明确指定监听端口（容器内部）
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:59092 # 告诉客户端连接的地址（外部可见）
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ============================================
  # Vector
  # ============================================
  vector:
    image: timberio/vector:latest-alpine
    container_name: secalert-vector-dev
    ports:
      - "50514:514"
      - "50515:515"
      - "59001:9001"
      - "59002:9002"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./collector/configs/vector.toml:/vector.toml:ro
    environment:
      VECTOR_CONFIG: /vector.toml
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # Elasticsearch
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: secalert-elasticsearch-dev
    ports:
      - "59200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: secalert-redis-dev
    ports:
      - "56379:6379"
    command: redis-server --maxmemory-policy allkeys-lru --maxmemory 256mb
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: secalert-postgres-dev
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: secalert
      POSTGRES_USER: secalert
      POSTGRES_PASSWORD: secalert_dev
    volumes:
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker_volume_data/postgres:/var/lib/postgresql/data
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "secalert"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # Neo4j
  # ============================================
  neo4j:
    image: neo4j:5.18-community
    container_name: secalert-neo4j-dev
    ports:
      - "57474:7474"
      - "57687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./docker_volume_data/neo4j/data:/data
      - ./docker_volume_data/neo4j/logs:/logs
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Logstash
  # ============================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: secalert-logstash-dev
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "55044:5044"
    environment:
      - "LS_JAVA_OPTS=-Xms2g -Xmx2g"
      - "LOGSTASH_ENABLED=${LOGSTASH_ENABLED:-false}"
      - "ES_HOST=elasticsearch:9200"
      - "ES_USER=${ES_USER:-elastic}"
      - "ES_PASSWORD=${ES_PASSWORD:-changeme}"
      - "ES_INDEX=${ES_INDEX:-security-alerts-*}"
      - "KAFKA_BOOTSTRAP=kafka:9092"
    networks:
      - secalert-network
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # MinIO
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: secalert-minio-dev
    ports:
      - "59000:9000"   # API
      - "59003:9001"   # Console (改为59003避免与vector的9001冲突)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./docker_volume_data/minio:/data
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # DLQ Consumer - 使用本地源码
  # ============================================
  dlq-consumer:
    build:
      context: .
      dockerfile: Dockerfile.dlq
    container_name: secalert-dlq-consumer-dev
    volumes:
      - ./parser:/app/parser:ro
      - ./src/collection:/app/src/collection:ro
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DLQ_TOPIC: dlq-events
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secalert-dlq
    networks:
      - secalert-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis(host='redis'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================
  # Prometheus: 指标监控
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: secalert-prometheus-dev
    ports:
      - "59090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker_volume_data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  secalert-network:
    name: secalert-network
    driver: bridge
