# ============================================
# SecAlert 开发环境配置
# 仅启动基础设施服务，API 和前端由用户手动启动
#
# 启动方式:
#   1. 启动基础设施 (Docker):
#      docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
#   2. 启动后端 (本地，端口 58000):
#      cd /home/admin/work/SecAlert && source .venv/bin/activate && uvicorn src.api.main:app --host 0.0.0.0 --port 58000 --reload
#
#   3. 启动前端 (本地，端口 3000):
#      cd /home/admin/work/SecAlert/frontend && npm run dev
#
#   端口映射:
#      58000 -> API (后端)
#      3000  -> 前端
# ============================================

services:
  # ============================================
  # DLQ Consumer - 使用本地源码
  # ============================================
  dlq-consumer:
    build:
      context: .
      dockerfile: Dockerfile.dlq
    container_name: secalert-dlq-consumer-dev
    volumes:
      - ./src:/app/src
      - ./parser:/app/parser
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      DLQ_TOPIC: dlq-events
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secalert-dlq
