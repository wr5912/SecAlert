input {
  # ES input 插件 - 用于从已有 ES 拉取数据
  elasticsearch {
    hosts => ["${ES_HOST:localhost:9200}"]
    user => "${ES_USER:elastic}"
    password => "${ES_PASSWORD:changeme}"
    index => "${ES_INDEX:security-alerts-*}"
    scroll => "5m"
    size => 2000
    docinfo => true
    query => '{"query": {
  "bool": {
    "must": [
      { "range": { "@timestamp": { "gte": "now-1h", "lte": "now" } } }
    ],
    "should": [
      { "terms": { "alert.severity": ["high", "critical"] } },
      { "terms": { "severity": ["high", "critical"] } },
      { "range": { "risk_score": { "gte": 70 } } }
    ],
    "minimum_should_match": 1
  }
}}'
  }
}

filter {
  # 标准化时间戳
  date {
    match => ["@timestamp", "ISO8601"]
    timezone => "Asia/Shanghai"
    target => "@timestamp"
  }

  # 移除 ES 6.x 的 _type metadata（ES 8.x 不兼容）
  mutate {
    remove_field => ["[@metadata][_type]"]
  }
}

output {
  # 输出到 Kafka（接入系统）
  # 生产环境配置：acks=all 确保消息持久化，retries 保证可靠性
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP:kafka:9092}"
    topic_id => "raw-events"
    codec => json
    document_id => "%{[@metadata][_id]}"
    acks => "all"
    retries => 3
    retry_backoff_ms => 100
  }
}