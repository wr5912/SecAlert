# Suricata 告警签名 -> ATT&CK 映射规则
# 格式: alert_signature: {tactic: TAxxxx, technique_id: Txxxx, technique_name: "名称"}

rules:
  # 扫描类
  "ET SCAN Potential SSH Scan":
    tactic: TA0043
    technique_id: T1046
    technique_name: "Network Service Discovery"

  "ET SCAN Web Scan":
    tactic: TA0043
    technique_id: T1046
    technique_name: "Network Service Discovery"

  "ET SCAN Port Scan":
    tactic: TA0043
    technique_id: T1046
    technique_name: "Network Service Discovery"

  # 暴力破解类
  "ET EXPLOIT SSH Root Auth Fail":
    tactic: TA0006
    technique_id: T1021
    technique_name: "Remote Services"

  "ET EXPLOIT FTP Login Fail":
    tactic: TA0006
    technique_id: T1021
    technique_name: "Remote Services"

  "ET POLICY HTTP Basic Auth":
    tactic: TA0006
    technique_id: T1078
    technique_name: "Valid Accounts"

  # 利用类
  "ET EXPLOIT Buffer Overflow":
    tactic: TA0004
    technique_id: T1068
    technique_name: "Exploitation for Privilege Escalation"

  "ET EXPLOIT SQL Injection Attempt":
    tactic: TA0001
    technique_id: T1190
    technique_name: "Exploit Public-Facing Application"

  "ET EXPLOIT XSS Attempt":
    tactic: TA0001
    technique_id: T1190
    technique_name: "Exploit Public-Facing Application"

  # 命令与控制类
  "ET MALWARE Suspicious HTTP User-Agent":
    tactic: TA0011
    technique_id: T1071
    technique_name: "Application Layer Protocol"

  "ET MALWARE Known Malicious HTTP Traffic":
    tactic: TA0011
    technique_id: T1071
    technique_name: "Application Layer Protocol"

  # 数据泄露类
  "ET EXFILTRATION Large Outbound Data":
    tactic: TA0010
    technique_id: T1041
    technique_name: "Exfiltration Over C2 Channel"

# ATT&CK Tactic ID 参考:
# - TA0001: Initial Access (初始访问)
# - TA0002: Execution (执行)
# - TA0003: Persistence (持久化)
# - TA0004: Privilege Escalation (权限提升)
# - TA0005: Defense Evasion (防御规避)
# - TA0006: Credential Access (凭证访问)
# - TA0007: Discovery (发现)
# - TA0008: Lateral Movement (横向移动)
# - TA0009: Collection (收集)
# - TA0010: Exfiltration (泄露)
# - TA0011: Command and Control (命令与控制)
# - TA0043: Reconnaissance (侦察)
