services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: secalert-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: secalert-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  vector:
    image: timberio/vector:latest-alpine
    container_name: secalert-vector
    ports:
      - "514:514"
      - "515:515"
      - "9001:9001"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./collector/configs/vector.toml:/vector.toml:ro
    environment:
      VECTOR_CONFIG: /vector.toml
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: secalert-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secalert-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory-policy allkeys-lru --maxmemory 256mb
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: secalert-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: secalert
      POSTGRES_USER: secalert
      POSTGRES_PASSWORD: secalert_dev
    volumes:
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "secalert"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: secalert-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./storage/neo4j/data:/data
      - ./storage/neo4j/logs:/logs
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: secalert-api
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
      - postgres
      - redis
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: neo4j_dev
      POSTGRES_URI: postgresql://secalert:secalert_dev@postgres:5432/secalert
      REDIS_URL: redis://redis:6379
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: secalert-logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
    environment:
      - "LS_JAVA_OPTS=-Xms2g -Xmx2g"
      - "LOGSTASH_ENABLED=${LOGSTASH_ENABLED:-false}"
    networks:
      - secalert-network
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  secalert-network:
    driver: bridge
