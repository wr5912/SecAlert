# ============================================
# SecAlert 完整服务配置 (生产/调试模式)
# ============================================
#
# 使用方式:
#   完整服务 (前后端使用 Docker): docker compose up
#   开发调试模式 (前后端本地源码): 见 docker-compose.dev.yml
#
# 开发调试模式启动:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# 排除前后端仅启动基础设施:
#   docker compose up zookeeper kafka elasticsearch redis postgres neo4j minio
#
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: secalert-zookeeper
    ports:
      - "52181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: secalert-kafka
    ports:
      - "59092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  vector:
    image: timberio/vector:latest-alpine
    container_name: secalert-vector
    ports:
      - "50514:514"
      - "50515:515"
      - "59001:9001"
      - "59002:9002"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./collector/configs/vector.toml:/vector.toml:ro
    environment:
      VECTOR_CONFIG: /vector.toml
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: secalert-elasticsearch
    ports:
      - "59200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: secalert-redis
    ports:
      - "56379:6379"
    command: redis-server --maxmemory-policy allkeys-lru --maxmemory 256mb
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: secalert-postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: secalert
      POSTGRES_USER: secalert
      POSTGRES_PASSWORD: secalert_dev
    volumes:
      - ./storage/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "secalert"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    container_name: secalert-neo4j
    ports:
      - "57474:7474"
      - "57687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./docker_volume_data/neo4j/data:/data
      - ./docker_volume_data/neo4j/logs:/logs
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API 服务 (通过 Dockerfile 构建)
  # 如需本地源码调试，使用 docker-compose.dev.yml 中的配置
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: secalert-api
    ports:
      - "58000:8000"
    depends_on:
      - neo4j
      - postgres
      - redis
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: neo4j_dev
      POSTGRES_URI: postgresql://secalert:secalert_dev@postgres:5432/secalert
      REDIS_URL: redis://redis:6379
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # Frontend: 前端 UI 服务 (React/Vite)
  # 如需本地源码调试，使用 docker-compose.dev.yml 中的配置
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: secalert-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE: /api
    networks:
      - secalert-network
    depends_on:
      - api

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: secalert-logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "55044:5044"
    environment:
      - "LS_JAVA_OPTS=-Xms2g -Xmx2g"
      - "LOGSTASH_ENABLED=${LOGSTASH_ENABLED:-false}"
      - "ES_HOST=elasticsearch:9200"
      - "ES_USER=${ES_USER:-elastic}"
      - "ES_PASSWORD=${ES_PASSWORD:-changeme}"
      - "ES_INDEX=${ES_INDEX:-security-alerts-*}"
      - "KAFKA_BOOTSTRAP=kafka:9092"
    networks:
      - secalert-network
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # MinIO: S3 兼容对象存储 (用于 DLQ 归档)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: secalert-minio
    ports:
      - "59000:9000"   # API
      - "59003:9001"   # Console (改为59003避免与vector的9001冲突)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./docker_volume_data/minio/data:/data
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============================================
  # DLQ Consumer: 死信队列消费者服务
  # ============================================
  dlq-consumer:
    build:
      context: .
      dockerfile: Dockerfile.dlq
    container_name: secalert-dlq-consumer
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DLQ_TOPIC: dlq-events
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: secalert-dlq
    volumes:
      - ./parser:/app/parser:ro
      - ./src/collection:/app/src/collection:ro
    networks:
      - secalert-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis(host='redis'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ============================================
  # Prometheus: 指标监控
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: secalert-prometheus
    ports:
      - "59090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker_volume_data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - secalert-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  secalert-network:
    driver: bridge
